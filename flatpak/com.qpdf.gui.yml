app-id: com.qpdf.gui
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: qpdf-gui

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: qpdf-gui
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/qpdf-gui/cargo
    build-commands:
      - pnpm install --frozen-lockfile
      - pnpm tauri build
      - install -Dm755 src-tauri/target/release/qpdf-gui /app/bin/qpdf-gui
      - install -Dm644 flatpak/com.qpdf.gui.desktop /app/share/applications/com.qpdf.gui.desktop
      - install -Dm644 logo.png /app/share/icons/hicolor/512x512/apps/com.qpdf.gui.png
    sources:
      - type: archive
        url: https://github.com/MrMostafaMo/qpdf-gui/archive/refs/tags/v1.3.0.tar.gz
        sha256: FILL_IN_AFTER_TAG
