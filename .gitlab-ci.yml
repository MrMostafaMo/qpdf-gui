stages:
  - build

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .pnpm-store
    - node_modules
    - src-tauri/target

# ---------------------------------------------------------------------------
# Linux x86_64 (runs on GitLab shared runners)
# ---------------------------------------------------------------------------
build:linux-x86_64:
  stage: build
  image: ubuntu:24.04
  variables:
    TARGET: x86_64-unknown-linux-gnu
  before_script:
    - apt-get update
    - apt-get install -y
        curl wget unzip cmake pkg-config
        libglib2.0-dev libgcrypt20-dev
        libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
        patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --target $TARGET
    - export PATH="$HOME/.cargo/bin:$PATH"
    - curl -fsSL https://get.pnpm.io/install.sh | sh -
    - export PATH="$HOME/.local/share/pnpm:$PATH"
    - pnpm install --frozen-lockfile
  script:
    - export PATH="$HOME/.cargo/bin:$HOME/.local/share/pnpm:$PATH"
    - curl -sL "https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2-bin-linux-x86_64.zip" -o qpdf-linux.zip
    - unzip -q qpdf-linux.zip -d qpdf-extract
    - chmod +x qpdf-extract/bin/qpdf
    - mkdir -p src-tauri/resources
    - cp qpdf-extract/bin/qpdf src-tauri/resources/qpdf
    - cp -a qpdf-extract/lib/* src-tauri/resources/
    - rm -rf qpdf-extract qpdf-linux.zip
    - pnpm tauri build --bundles deb,rpm,appimage
  artifacts:
    name: "qpdf-gui-linux-x86_64"
    paths:
      - src-tauri/target/release/bundle/deb/*.deb
      - src-tauri/target/release/bundle/rpm/*.rpm
      - src-tauri/target/release/bundle/appimage/*.AppImage
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Linux ARM64 (requires ARM64 runner, optional)
# ---------------------------------------------------------------------------
build:linux-arm64:
  stage: build
  image: ubuntu:24.04
  tags:
    - arm64
  variables:
    TARGET: aarch64-unknown-linux-gnu
  before_script:
    - apt-get update
    - apt-get install -y
        curl wget unzip cmake pkg-config
        libglib2.0-dev libgcrypt20-dev
        libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev
        patchelf libgtk-3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --target $TARGET
    - export PATH="$HOME/.cargo/bin:$PATH"
    - curl -fsSL https://get.pnpm.io/install.sh | sh -
    - export PATH="$HOME/.local/share/pnpm:$PATH"
    - pnpm install --frozen-lockfile
  script:
    - export PATH="$HOME/.cargo/bin:$HOME/.local/share/pnpm:$PATH"
    - QPDF_VERSION="12.3.2"
    - curl -sL "https://github.com/qpdf/qpdf/releases/download/v${QPDF_VERSION}/qpdf-${QPDF_VERSION}.tar.gz" -o qpdf-src.tar.gz
    - tar xzf qpdf-src.tar.gz
    - mkdir build && cd build
    - cmake "../qpdf-${QPDF_VERSION}" -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DREQUIRE_CRYPTO_NATIVE=OFF
    - cmake --build . --config Release -j$(nproc)
    - cd ..
    - mkdir -p src-tauri/resources
    - cp build/qpdf/qpdf src-tauri/resources/qpdf
    - chmod +x src-tauri/resources/qpdf
    - cp build/libqpdf/libqpdf.so* src-tauri/resources/
    - rm -rf qpdf-src.tar.gz qpdf-${QPDF_VERSION} build
    - pnpm tauri build --bundles deb,rpm,appimage
  artifacts:
    name: "qpdf-gui-linux-arm64"
    paths:
      - src-tauri/target/release/bundle/deb/*.deb
      - src-tauri/target/release/bundle/rpm/*.rpm
      - src-tauri/target/release/bundle/appimage/*.AppImage
    expire_in: 30 days
  allow_failure: true

# ---------------------------------------------------------------------------
# Windows (requires self-hosted runner with `windows` tag)
# ---------------------------------------------------------------------------
build:windows:
  stage: build
  tags:
    - windows
  variables:
    TARGET: x86_64-pc-windows-msvc
  before_script:
    - choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
    - choco install rustup -y
    - refreshenv
    - rustup default stable
    - rustup target add $TARGET
    - npm install -g pnpm
  script:
    - curl -sL "https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2-msvc64.zip" -o qpdf-win.zip
    - 7z x qpdf-win.zip -oqpdf-extract
    - mkdir -p src-tauri/resources
    - cp qpdf-extract/qpdf-12.3.2-msvc64/bin/qpdf.exe src-tauri/resources/qpdf.exe
    - cp qpdf-extract/qpdf-12.3.2-msvc64/bin/*.dll src-tauri/resources/
    - rm -rf qpdf-extract qpdf-win.zip
    - pnpm install --frozen-lockfile
    - pnpm tauri build
  artifacts:
    name: "qpdf-gui-windows"
    paths:
      - src-tauri/target/release/bundle/msi/*.msi
      - src-tauri/target/release/bundle/nsis/*.exe
    expire_in: 30 days
  allow_failure: true

# ---------------------------------------------------------------------------
# macOS (requires self-hosted runner with `macos` tag)
# ---------------------------------------------------------------------------
build:macos:
  stage: build
  tags:
    - macos
  variables:
    TARGET: aarch64-apple-darwin
  before_script:
    - brew install cmake
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --target $TARGET
    - export PATH="$HOME/.cargo/bin:$PATH"
    - curl -fsSL https://get.pnpm.io/install.sh | sh -
    - export PATH="$HOME/.local/share/pnpm:$PATH"
  script:
    - export PATH="$HOME/.cargo/bin:$HOME/.local/share/pnpm:$PATH"
    - QPDF_VERSION="12.3.2"
    - curl -sL "https://github.com/qpdf/qpdf/releases/download/v${QPDF_VERSION}/qpdf-${QPDF_VERSION}.tar.gz" -o qpdf-src.tar.gz
    - tar xzf qpdf-src.tar.gz
    - mkdir build && cd build
    - cmake "../qpdf-${QPDF_VERSION}" -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DREQUIRE_CRYPTO_NATIVE=OFF
    - cmake --build . --config Release -j$(sysctl -n hw.ncpu)
    - cd ..
    - mkdir -p src-tauri/resources
    - cp build/qpdf/qpdf src-tauri/resources/qpdf
    - chmod +x src-tauri/resources/qpdf
    - cp build/libqpdf/libqpdf.dylib src-tauri/resources/
    - rm -rf qpdf-src.tar.gz qpdf-${QPDF_VERSION} build
    - pnpm install --frozen-lockfile
    - pnpm tauri build
  artifacts:
    name: "qpdf-gui-macos"
    paths:
      - src-tauri/target/release/bundle/dmg/*.dmg
    expire_in: 30 days
  allow_failure: true

# ---------------------------------------------------------------------------
# Release (on tag push)
# ---------------------------------------------------------------------------
release:
  stage: build
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - job: build:linux-x86_64
      artifacts: true
    - job: build:linux-arm64
      optional: true
    - job: build:windows
      optional: true
    - job: build:macos
      optional: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "QPDF GUI $CI_COMMIT_TAG"
    description: "See the assets below to download and install."
  artifacts:
    paths:
      - src-tauri/target/release/bundle/deb/*.deb
      - src-tauri/target/release/bundle/rpm/*.rpm
      - src-tauri/target/release/bundle/appimage/*.AppImage
      - src-tauri/target/release/bundle/msi/*.msi
      - src-tauri/target/release/bundle/nsis/*.exe
      - src-tauri/target/release/bundle/dmg/*.dmg
