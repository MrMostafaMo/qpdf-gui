name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            target: universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Download qpdf (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -sL "https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2-bin-linux-x86_64.zip" -o qpdf-linux.zip
          unzip -q qpdf-linux.zip -d qpdf-extract
          chmod +x qpdf-extract/bin/qpdf
          mkdir -p src-tauri/resources
          cp qpdf-extract/bin/qpdf src-tauri/resources/qpdf
          cp -a qpdf-extract/lib/* src-tauri/resources/
          rm -rf qpdf-extract qpdf-linux.zip
          ls -la src-tauri/resources/

      - name: Download qpdf (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          curl -sL "https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2-msvc64.zip" -o qpdf-win.zip
          7z x qpdf-win.zip -oqpdf-extract -q
          mkdir -p src-tauri/resources
          cp qpdf-extract/qpdf-12.3.2-msvc64/bin/qpdf.exe src-tauri/resources/qpdf.exe
          cp qpdf-extract/qpdf-12.3.2-msvc64/bin/*.dll src-tauri/resources/
          rm -rf qpdf-extract qpdf-win.zip
          ls src-tauri/resources/

      - name: Build qpdf from source (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install cmake
          QPDF_VERSION="12.3.2"
          curl -sL "https://github.com/qpdf/qpdf/releases/download/v${QPDF_VERSION}/qpdf-${QPDF_VERSION}.tar.gz" -o qpdf-src.tar.gz
          tar xzf qpdf-src.tar.gz

          # Build for arm64
          mkdir build-arm64 && cd build-arm64
          arch -arm64 cmake "../qpdf-${QPDF_VERSION}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_STATIC_LIBS=OFF \
            -DREQUIRE_CRYPTO_NATIVE=OFF
          arch -arm64 cmake --build . --config Release -j$(sysctl -n hw.ncpu)
          cd ..

          # Build for x86_64
          mkdir build-x86_64 && cd build-x86_64
          arch -x86_64 cmake "../qpdf-${QPDF_VERSION}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_STATIC_LIBS=OFF \
            -DREQUIRE_CRYPTO_NATIVE=OFF
          arch -x86_64 cmake --build . --config Release -j$(sysctl -n hw.ncpu)
          cd ..

          # Create universal binary
          mkdir -p src-tauri/resources
          lipo -create \
            build-arm64/qpdf/qpdf \
            build-x86_64/qpdf/qpdf \
            -output src-tauri/resources/qpdf
          chmod +x src-tauri/resources/qpdf

          # Copy shared libraries for both architectures
          lipo -create \
            build-arm64/libqpdf/libqpdf.dylib \
            build-x86_64/libqpdf/libqpdf.dylib \
            -output src-tauri/resources/libqpdf.dylib

          rm -rf qpdf-src.tar.gz qpdf-${QPDF_VERSION} build-arm64 build-x86_64
          ls -la src-tauri/resources/

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "QPDF GUI ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
