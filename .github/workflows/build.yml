name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: "--bundles deb,rpm,appimage"
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-24.04-arm
            args: "--bundles deb,rpm,appimage"
            target: aarch64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            target: x86_64-pc-windows-msvc
          - platform: macos-14
            args: ""
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Download qpdf (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          curl -sL "https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2-bin-linux-x86_64.zip" -o qpdf-linux.zip
          unzip -q qpdf-linux.zip -d qpdf-extract
          chmod +x qpdf-extract/bin/qpdf
          mkdir -p src-tauri/resources
          cp qpdf-extract/bin/qpdf src-tauri/resources/qpdf
          cp -a qpdf-extract/lib/* src-tauri/resources/
          rm -rf qpdf-extract qpdf-linux.zip
          ls -la src-tauri/resources/

      - name: Download qpdf (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y cmake libgcrypt20-dev
          QPDF_VERSION="12.3.2"
          curl -sL "https://github.com/qpdf/qpdf/releases/download/v${QPDF_VERSION}/qpdf-${QPDF_VERSION}.tar.gz" -o qpdf-src.tar.gz
          tar xzf qpdf-src.tar.gz

          mkdir build && cd build
          cmake "../qpdf-${QPDF_VERSION}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_STATIC_LIBS=OFF \
            -DREQUIRE_CRYPTO_NATIVE=OFF
          cmake --build . --config Release -j$(nproc)
          cd ..

          mkdir -p src-tauri/resources
          cp build/qpdf/qpdf src-tauri/resources/qpdf
          chmod +x src-tauri/resources/qpdf
          cp build/libqpdf/libqpdf.so* src-tauri/resources/

          rm -rf qpdf-src.tar.gz qpdf-${QPDF_VERSION} build
          ls -la src-tauri/resources/

      - name: Download qpdf (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          curl -sL "https://github.com/qpdf/qpdf/releases/download/v12.3.2/qpdf-12.3.2-msvc64.zip" -o qpdf-win.zip
          7z x qpdf-win.zip -oqpdf-extract
          mkdir -p src-tauri/resources
          cp qpdf-extract/qpdf-12.3.2-msvc64/bin/qpdf.exe src-tauri/resources/qpdf.exe
          cp qpdf-extract/qpdf-12.3.2-msvc64/bin/*.dll src-tauri/resources/
          rm -rf qpdf-extract qpdf-win.zip
          ls src-tauri/resources/

      - name: Build qpdf from source (macOS)
        if: matrix.platform == 'macos-14'
        run: |
          brew install cmake
          QPDF_VERSION="12.3.2"
          curl -sL "https://github.com/qpdf/qpdf/releases/download/v${QPDF_VERSION}/qpdf-${QPDF_VERSION}.tar.gz" -o qpdf-src.tar.gz
          tar xzf qpdf-src.tar.gz

          mkdir build && cd build
          cmake "../qpdf-${QPDF_VERSION}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_STATIC_LIBS=OFF \
            -DREQUIRE_CRYPTO_NATIVE=OFF
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
          cd ..

          mkdir -p src-tauri/resources
          cp build/qpdf/qpdf src-tauri/resources/qpdf
          chmod +x src-tauri/resources/qpdf
          cp build/libqpdf/libqpdf.dylib src-tauri/resources/

          rm -rf qpdf-src.tar.gz qpdf-${QPDF_VERSION} build
          ls -la src-tauri/resources/

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: "QPDF GUI ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
